version: '3.8'

services:
  postgres:
    image: postgres:16.13-alpine3.23
    container_name: postgresNest
    restart: always
    environment:
      POSTGRES_USER: angel
      POSTGRES_PASSWORD: 123456a
      POSTGRES_DB: postgres
    volumes:
      - ./postgres:/var/lib/postgresql/data
    ports:
      - 5432:5432